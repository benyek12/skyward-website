<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://fjzakreyvslntzhbuhkv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqemFrcmV5dnNsbnR6aGJ1aGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTQxODEsImV4cCI6MjA5MzUzMDE4MX0.8fOOaMDUuaGDqE8SRhwq9Pcw2qYQPca2cl_mNMHMClM';
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const OWNER_EMAIL = 'rendisn0@gmail.com';

  let currentUser = null;
  let currentProfile = null;

  // ── HELPER: set button loading state ─────────────
  function setLoading(btnEl, msgEl, loading, loadingText, defaultText) {
    btnEl.disabled = loading;
    btnEl.textContent = loading ? loadingText : defaultText;
    if (!loading) return;
    msgEl.textContent = '';
    msgEl.className = 'auth-msg';
  }

  // ── TAB SWITCH ───────────────────────────────────
  window.switchTab = (tab) => {
    document.querySelectorAll('.auth-tab').forEach((t, i) => {
      t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'register'));
    });
    document.getElementById('tab-login').style.display = tab === 'login' ? '' : 'none';
    document.getElementById('tab-register').style.display = tab === 'register' ? '' : 'none';
  };

  // ── HELPER: buat/ambil profile ───────────────────
  async function ensureProfile(user) {
    // Coba ambil dulu
    const { data: existing } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
    if (existing) return existing;

    // Kalau belum ada, buat otomatis (fallback)
    const isOwner = user.email === OWNER_EMAIL;
    const username = user.email.split('@')[0];
    const { data: created, error } = await sb.from('profiles').upsert({
      id: user.id,
      username,
      role: isOwner ? 'owner' : 'user',
      approved: isOwner
    }, { onConflict: 'id' }).select().maybeSingle();

    if (error) console.error('Profile upsert error:', error);
    return created;
  }

  // ── LOGIN ────────────────────────────────────────
  window.handleLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('login-msg');
    const btn = document.querySelector('#tab-login .btn-auth');

    if (!email || !password) {
      msg.textContent = 'Email dan password wajib diisi!';
      msg.className = 'auth-msg error';
      return;
    }

    setLoading(btn, msg, true, 'MEMPROSES...', 'MASUK');

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      msg.textContent = error.message === 'Invalid login credentials'
        ? 'Email atau password salah!'
        : error.message;
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = 'MASUK';
      return;
    }

    msg.textContent = 'Berhasil login!';
    msg.className = 'auth-msg success';
    // onAuthStateChange akan handle pindah ke dashboard
  };

  // ── REGISTER ─────────────────────────────────────
  window.handleRegister = async () => {
    const username = document.getElementById('reg-username').value.trim();
    const email = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const msg = document.getElementById('reg-msg');
    const btn = document.querySelector('#tab-register .btn-auth');

    if (!username) { msg.textContent = 'Username wajib diisi!'; msg.className = 'auth-msg error'; return; }
    if (!email) { msg.textContent = 'Email wajib diisi!'; msg.className = 'auth-msg error'; return; }
    if (password.length < 6) { msg.textContent = 'Password minimal 6 karakter!'; msg.className = 'auth-msg error'; return; }

    setLoading(btn, msg, true, 'MENDAFTAR...', 'DAFTAR');

    const { data, error } = await sb.auth.signUp({ email, password });

    if (error) {
      msg.textContent = error.message;
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = 'DAFTAR';
      return;
    }

    // Pastikan user object ada
    const user = data?.user;
    if (!user) {
      // Email confirmation aktif — beritahu user
      msg.textContent = 'Cek email kamu untuk konfirmasi akun terlebih dahulu!';
      msg.className = 'auth-msg success';
      btn.disabled = false;
      btn.textContent = 'DAFTAR';
      return;
    }

    // Insert profile dengan upsert (aman dari duplikat)
    const isOwner = email === OWNER_EMAIL;
    const { error: profileError } = await sb.from('profiles').upsert({
      id: user.id,
      username,
      role: isOwner ? 'owner' : 'user',
      approved: isOwner
    }, { onConflict: 'id' });

    if (profileError) {
      console.error('Profile error:', profileError);
      msg.textContent = 'Daftar berhasil tapi gagal simpan profil: ' + profileError.message;
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = 'DAFTAR';
      return;
    }

    msg.textContent = isOwner ? 'Selamat datang, Owner!' : 'Berhasil daftar! Tunggu persetujuan owner.';
    msg.className = 'auth-msg success';
    // onAuthStateChange akan otomatis handle redirect ke dashboard
  };

  // ── LOGOUT ───────────────────────────────────────
  window.handleLogout = async () => {
    await sb.auth.signOut();
  };

  // ── POST ─────────────────────────────────────────
  window.handlePost = async () => {
    const title = document.getElementById('post-title').value.trim();
    const content = document.getElementById('post-content').value.trim();
    if (!title || !content) return alert('Judul dan isi wajib diisi!');

    const { error } = await sb.from('posts').insert({ title, content, author_id: currentUser.id });
    if (error) { alert('Gagal post: ' + error.message); return; }

    document.getElementById('post-title').value = '';
    document.getElementById('post-content').value = '';
    loadPosts();
  };

  // ── DELETE POST ──────────────────────────────────
  window.handleDeletePost = async (id) => {
    if (!confirm('Hapus pengumuman ini?')) return;
    await sb.from('posts').delete().eq('id', id);
    loadPosts();
  };

  // ── APPROVE USER ─────────────────────────────────
  window.handleApprove = async (id, approve) => {
    await sb.from('profiles').update({
      approved: approve,
      role: approve ? 'admin' : 'user'
    }).eq('id', id);
    loadUsers();
  };

  // ── LOAD POSTS ───────────────────────────────────
  async function loadPosts() {
    const { data, error } = await sb.from('posts').select('*, profiles(username)').order('created_at', { ascending: false });
    const el = document.getElementById('posts-list');
    if (error || !data?.length) { el.innerHTML = '<div class="empty-state">Belum ada pengumuman.</div>'; return; }

    const isAdminOrOwner = currentProfile?.role === 'admin' || currentProfile?.role === 'owner';
    el.innerHTML = data.map(p => `
      <div class="post-item">
        <div>
          <div class="post-item-title">${p.title}</div>
          <div class="post-item-content">${p.content}</div>
          <div class="post-item-meta">oleh @${p.profiles?.username || '?'} · ${new Date(p.created_at).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        ${isAdminOrOwner ? `<button class="btn-delete" onclick="handleDeletePost(${p.id})">HAPUS</button>` : ''}
      </div>
    `).join('');
  }

  // ── LOAD USERS ───────────────────────────────────
  async function loadUsers() {
    const { data } = await sb.from('profiles').select('*').neq('role', 'owner').order('created_at');
    const el = document.getElementById('users-list');
    if (!data?.length) { el.innerHTML = '<div class="empty-state">Belum ada user terdaftar.</div>'; return; }

    el.innerHTML = data.map(u => `
      <div class="user-item">
        <div class="user-info">
          <div class="user-name">@${u.username}</div>
          <span class="badge ${u.approved ? 'badge-admin' : 'badge-pending'}">${u.approved ? 'ADMIN' : 'PENDING'}</span>
        </div>
        <div class="user-actions">
          ${!u.approved ? `<button class="btn-approve" onclick="handleApprove('${u.id}', true)">APPROVE</button>` : ''}
          ${u.approved ? `<button class="btn-revoke" onclick="handleApprove('${u.id}', false)">REVOKE</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  // ── AUTH STATE ───────────────────────────────────
  sb.auth.onAuthStateChange(async (event, session) => {
    if (session?.user) {
      currentUser = session.user;

      // Ambil atau buat profile
      const profile = await ensureProfile(currentUser);
      currentProfile = profile;

      // Tampilkan dashboard
      document.getElementById('auth-screen').style.display = 'none';
      document.getElementById('dashboard').style.display = '';

      // Set topbar
      document.getElementById('topbar-username').textContent = '@' + (profile?.username || currentUser.email.split('@')[0]);
      const badge = document.getElementById('topbar-badge');
      const role = profile?.role || 'user';
      badge.textContent = role.toUpperCase();
      badge.className = `badge badge-${role}`;

      // Tampilkan/sembunyikan section
      const isAdminOrOwner = role === 'admin' || role === 'owner';
      const isPending = role === 'user' && !profile?.approved;

      document.getElementById('pending-notice').style.display = isPending ? '' : 'none';
      document.getElementById('post-section').style.display = isAdminOrOwner ? '' : 'none';
      document.getElementById('users-section').style.display = role === 'owner' ? '' : 'none';

      loadPosts();
      if (role === 'owner') loadUsers();

    } else {
      currentUser = null;
      currentProfile = null;
      document.getElementById('auth-screen').style.display = '';
      document.getElementById('dashboard').style.display = 'none';
    }
  });
</script>
</body>
</html>
