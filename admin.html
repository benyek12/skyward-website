<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SKYWARD ADMIN</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&family=Space+Mono&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #111118;
      --border: rgba(255,255,255,0.08);
      --accent: #FF2D20;
      --accent2: #5865F2;
      --text: #f0f0f0;
      --muted: #888;
      --green: #22c55e;
      --yellow: #f59e0b;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Rajdhani', sans-serif; min-height: 100vh; }

    /* AUTH */
    #auth-screen {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at 50% 0%, rgba(255,45,32,0.12) 0%, transparent 60%);
    }
    .auth-box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo { font-family: 'Bebas Neue'; font-size: 2rem; color: var(--accent); letter-spacing: 2px; margin-bottom: 8px; }
    .auth-subtitle { color: var(--muted); font-size: 0.9rem; margin-bottom: 32px; }
    .auth-tabs { display: flex; gap: 8px; margin-bottom: 24px; }
    .auth-tab {
      flex: 1; padding: 10px; background: transparent; border: 1px solid var(--border);
      color: var(--muted); font-family: 'Rajdhani'; font-weight: 700; font-size: 0.9rem;
      letter-spacing: 1px; border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .auth-tab.active { background: var(--accent); border-color: var(--accent); color: white; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 0.8rem; letter-spacing: 1px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; }
    .form-group input {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-family: 'Rajdhani'; font-size: 1rem; outline: none; transition: border 0.2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn-auth {
      width: 100%; padding: 14px; background: var(--accent); border: none;
      border-radius: 8px; color: white; font-family: 'Bebas Neue'; font-size: 1.1rem;
      letter-spacing: 2px; cursor: pointer; transition: opacity 0.2s; margin-top: 8px;
    }
    .btn-auth:hover { opacity: 0.85; }
    .auth-msg { margin-top: 12px; font-size: 0.85rem; text-align: center; min-height: 20px; }
    .auth-msg.error { color: var(--accent); }
    .auth-msg.success { color: var(--green); }

    /* DASHBOARD */
    #dashboard { display: none; }
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 32px; border-bottom: 1px solid var(--border);
      background: var(--card); position: sticky; top: 0; z-index: 100;
    }
    .topbar-logo { font-family: 'Bebas Neue'; font-size: 1.4rem; color: var(--accent); letter-spacing: 2px; }
    .topbar-user { display: flex; align-items: center; gap: 12px; font-size: 0.9rem; color: var(--muted); }
    .badge {
      padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: 700;
      letter-spacing: 1px; text-transform: uppercase;
    }
    .badge-owner { background: rgba(255,45,32,0.2); color: var(--accent); border: 1px solid rgba(255,45,32,0.3); }
    .badge-admin { background: rgba(88,101,242,0.2); color: #a78bfa; border: 1px solid rgba(88,101,242,0.3); }
    .badge-pending { background: rgba(245,158,11,0.2); color: var(--yellow); border: 1px solid rgba(245,158,11,0.3); }
    .badge-user { background: rgba(255,255,255,0.08); color: var(--muted); border: 1px solid var(--border); }
    .btn-logout {
      padding: 8px 16px; background: transparent; border: 1px solid var(--border);
      border-radius: 8px; color: var(--muted); font-family: 'Rajdhani'; font-weight: 700;
      cursor: pointer; transition: all 0.2s; font-size: 0.85rem;
    }
    .btn-logout:hover { border-color: var(--accent); color: var(--accent); }

    .dashboard-content { padding: 32px; max-width: 1100px; margin: 0 auto; }
    .pending-notice {
      background: rgba(245,158,11,0.1); border: 1px solid rgba(245,158,11,0.3);
      border-radius: 12px; padding: 20px 24px; margin-bottom: 32px; color: var(--yellow);
      font-size: 1rem; line-height: 1.6;
    }

    .section-title {
      font-family: 'Bebas Neue'; font-size: 1.5rem; letter-spacing: 2px;
      color: var(--text); margin-bottom: 20px; display: flex; align-items: center; gap: 12px;
    }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

    /* POST FORM */
    .post-form {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 24px; margin-bottom: 32px;
    }
    .post-form input, .post-form textarea {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--border); border-radius: 8px; color: var(--text);
      font-family: 'Rajdhani'; font-size: 1rem; outline: none; transition: border 0.2s;
      margin-bottom: 12px;
    }
    .post-form input:focus, .post-form textarea:focus { border-color: var(--accent); }
    .post-form textarea { resize: vertical; min-height: 100px; }
    .btn-post {
      padding: 12px 28px; background: var(--accent); border: none; border-radius: 8px;
      color: white; font-family: 'Bebas Neue'; font-size: 1rem; letter-spacing: 2px;
      cursor: pointer; transition: opacity 0.2s;
    }
    .btn-post:hover { opacity: 0.85; }

    /* POSTS LIST */
    .posts-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 40px; }
    .post-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 12px;
      padding: 20px; display: flex; justify-content: space-between; align-items: flex-start; gap: 16px;
    }
    .post-item-title { font-weight: 700; font-size: 1.05rem; margin-bottom: 4px; }
    .post-item-content { color: var(--muted); font-size: 0.9rem; line-height: 1.5; }
    .post-item-meta { font-size: 0.75rem; color: var(--muted); margin-top: 8px; }
    .btn-delete {
      padding: 6px 14px; background: transparent; border: 1px solid rgba(255,45,32,0.3);
      border-radius: 6px; color: var(--accent); font-family: 'Rajdhani'; font-weight: 700;
      cursor: pointer; font-size: 0.8rem; white-space: nowrap; transition: all 0.2s;
    }
    .btn-delete:hover { background: rgba(255,45,32,0.1); }

    /* USERS LIST (owner only) */
    .users-list { display: flex; flex-direction: column; gap: 10px; }
    .user-item {
      background: var(--card); border: 1px solid var(--border); border-radius: 10px;
      padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 12px;
    }
    .user-info { display: flex; align-items: center; gap: 12px; }
    .user-name { font-weight: 700; }
    .user-actions { display: flex; gap: 8px; }
    .btn-approve {
      padding: 6px 14px; background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.3);
      border-radius: 6px; color: var(--green); font-family: 'Rajdhani'; font-weight: 700;
      cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
    }
    .btn-approve:hover { background: rgba(34,197,94,0.2); }
    .btn-revoke {
      padding: 6px 14px; background: transparent; border: 1px solid var(--border);
      border-radius: 6px; color: var(--muted); font-family: 'Rajdhani'; font-weight: 700;
      cursor: pointer; font-size: 0.8rem; transition: all 0.2s;
    }
    .btn-revoke:hover { border-color: var(--accent); color: var(--accent); }

    .empty-state { text-align: center; color: var(--muted); padding: 40px; font-size: 0.95rem; }
  </style>
</head>
<body>


<!-- AUTH SCREEN -->
<div id="auth-screen">
  <div class="auth-box">
    <div class="auth-logo">⬢ SKYWARD</div>
    <div class="auth-subtitle">Admin Panel — Khusus Admin</div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="email@kamu.com"/>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="login-password" placeholder="••••••••"/>
    </div>
    <button class="btn-auth" onclick="handleLogin()">MASUK</button>
    <div class="auth-msg" id="login-msg"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard">
  <div class="topbar">
    <div class="topbar-logo">⬢ SKYWARD ADMIN</div>
    <div class="topbar-user">
      <span id="topbar-username">—</span>
      <span id="topbar-badge" class="badge"></span>
      <button class="btn-logout" onclick="handleLogout()">KELUAR</button>
    </div>
  </div>

  <div class="dashboard-content">

    <!-- Pending notice -->
    <div class="pending-notice" id="pending-notice" style="display:none">
      ⏳ Akun kamu sedang menunggu persetujuan dari owner. Kamu akan bisa posting setelah diapprove.
    </div>

    <!-- POST FORM (admin/owner only) -->
    <div id="post-section" style="display:none">
      <div class="section-title">BUAT PENGUMUMAN</div>
      <div class="post-form">
        <input type="text" id="post-title" placeholder="Judul pengumuman..."/>
        <textarea id="post-content" placeholder="Isi pengumuman..."></textarea>
        <button class="btn-post" onclick="handlePost()">⬢ PUBLISH</button>
      </div>
    </div>

    <!-- POSTS LIST -->
    <div class="section-title">PENGUMUMAN</div>
    <div class="posts-list" id="posts-list">
      <div class="empty-state">Memuat...</div>
    </div>

    <!-- USERS (owner only) -->
    <div id="users-section" style="display:none">
      <div class="section-title">KELOLA USER</div>
      <div class="users-list" id="users-list">
        <div class="empty-state">Memuat...</div>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';

  const SUPABASE_URL = 'https://fjzakreyvslntzhbuhkv.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZqemFrcmV5dnNsbnR6aGJ1aGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc5NTQxODEsImV4cCI6MjA5MzUzMDE4MX0.8fOOaMDUuaGDqE8SRhwq9Pcw2qYQPca2cl_mNMHMClM';
  const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Daftar email yang boleh login
  const ALLOWED_EMAILS = ['benyeksetia@gmail.com'];

  let currentUser = null;
  let currentProfile = null;

  window.handleLogin = async () => {
    const email = document.getElementById('login-email').value.trim();
    const password = document.getElementById('login-password').value;
    const msg = document.getElementById('login-msg');
    const btn = document.querySelector('.btn-auth');

    if (!email || !password) {
      msg.textContent = 'Email dan password wajib diisi!';
      msg.className = 'auth-msg error';
      return;
    }

    // Cek apakah email diizinkan
    if (!ALLOWED_EMAILS.includes(email)) {
      msg.textContent = 'Akses ditolak! Kamu bukan admin.';
      msg.className = 'auth-msg error';
      return;
    }

    btn.disabled = true;
    btn.textContent = 'MEMPROSES...';
    msg.textContent = '';

    const { data, error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      msg.textContent = 'Email atau password salah!';
      msg.className = 'auth-msg error';
      btn.disabled = false;
      btn.textContent = 'MASUK';
      return;
    }

    await showDashboard(data.user);
  };

  async function showDashboard(user) {
    currentUser = user;

    // Ambil atau buat profile otomatis
    let { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();

    if (!profile) {
      await sb.from('profiles').insert({
        id: user.id,
        username: user.email.split('@')[0],
        role: 'owner',
        approved: true
      });
      const { data: newProfile } = await sb.from('profiles').select('*').eq('id', user.id).maybeSingle();
      profile = newProfile;
    }

    currentProfile = profile;

    document.getElementById('auth-screen').style.display = 'none';
    document.getElementById('dashboard').style.display = '';

    const role = profile?.role || 'owner';
    document.getElementById('topbar-username').textContent = '@' + (profile?.username || user.email.split('@')[0]);
    const badge = document.getElementById('topbar-badge');
    badge.textContent = role.toUpperCase();
    badge.className = `badge badge-${role}`;

    document.getElementById('pending-notice').style.display = 'none';
    document.getElementById('post-section').style.display = '';
    document.getElementById('users-section').style.display = role === 'owner' ? '' : 'none';

    loadPosts();
    if (role === 'owner') loadUsers();
  }

  window.handleLogout = async () => {
    await sb.auth.signOut();
    currentUser = null;
    currentProfile = null;
    document.getElementById('auth-screen').style.display = '';
    document.getElementById('dashboard').style.display = 'none';
  };

  window.handlePost = async () => {
    const title = document.getElementById('post-title').value.trim();
    const content = document.getElementById('post-content').value.trim();
    if (!title || !content) return alert('Judul dan isi wajib diisi!');
    const { error } = await sb.from('posts').insert({ title, content, author_id: currentUser.id });
    if (error) { alert('Gagal post: ' + error.message); return; }
    document.getElementById('post-title').value = '';
    document.getElementById('post-content').value = '';
    loadPosts();
  };

  window.handleDeletePost = async (id) => {
    if (!confirm('Hapus pengumuman ini?')) return;
    await sb.from('posts').delete().eq('id', id);
    loadPosts();
  };

  window.handleApprove = async (id, approve) => {
    await sb.from('profiles').update({
      approved: approve,
      role: approve ? 'admin' : 'user'
    }).eq('id', id);
    loadUsers();
  };

  async function loadPosts() {
    const { data, error } = await sb.from('posts').select('*, profiles(username)').order('created_at', { ascending: false });
    const el = document.getElementById('posts-list');
    if (error || !data?.length) { el.innerHTML = '<div class="empty-state">Belum ada pengumuman.</div>'; return; }
    const isAdminOrOwner = true;
    el.innerHTML = data.map(p => `
      <div class="post-item">
        <div>
          <div class="post-item-title">${p.title}</div>
          <div class="post-item-content">${p.content}</div>
          <div class="post-item-meta">oleh @${p.profiles?.username || '?'} · ${new Date(p.created_at).toLocaleDateString('id-ID', {day:'numeric',month:'long',year:'numeric'})}</div>
        </div>
        <button class="btn-delete" onclick="handleDeletePost(${p.id})">HAPUS</button>
      </div>
    `).join('');
  }

  async function loadUsers() {
    const { data } = await sb.from('profiles').select('*').neq('role', 'owner').order('created_at');
    const el = document.getElementById('users-list');
    if (!data?.length) { el.innerHTML = '<div class="empty-state">Belum ada user terdaftar.</div>'; return; }
    el.innerHTML = data.map(u => `
      <div class="user-item">
        <div class="user-info">
          <div class="user-name">@${u.username}</div>
          <span class="badge ${u.approved ? 'badge-admin' : 'badge-pending'}">${u.approved ? 'ADMIN' : 'PENDING'}</span>
        </div>
        <div class="user-actions">
          ${!u.approved ? `<button class="btn-approve" onclick="handleApprove('${u.id}', true)">APPROVE</button>` : ''}
          ${u.approved ? `<button class="btn-revoke" onclick="handleApprove('${u.id}', false)">REVOKE</button>` : ''}
        </div>
      </div>
    `).join('');
  }

  // Cek session yang sudah ada
  sb.auth.onAuthStateChange(async (event, session) => {
    if (event === 'SIGNED_IN' && session?.user && !currentUser) {
      await showDashboard(session.user);
    }
    if (event === 'SIGNED_OUT') {
      currentUser = null;
      currentProfile = null;
      document.getElementById('auth-screen').style.display = '';
      document.getElementById('dashboard').style.display = 'none';
    }
  });
</script>
</body>
</html>
